services:
  api:
    build: .
    restart: unless-stopped
    # Host networking -- simplest option for a single-Pi setup where
    # Postgres is already installed natively (not containerized) and
    # listening on localhost:5432. This lets the container reach it via
    # `localhost` exactly like `poetry run uvicorn` did, no bridge
    # networking or port-mapping juggling needed.
    network_mode: host
    env_file: .env
    # No `ports:` needed under host networking -- the container shares
    # the Pi's network stack directly, so port 8000 is already exposed
    # on the Pi itself once the container is running.
    # Persists uploaded product photos (see POST /items/scan-product-photo)
    # on the host, outside the container's filesystem -- otherwise they'd
    # vanish on every rebuild/recreate. Left-hand side is a path on the
    # Pi; right-hand side must match Settings.media_dir resolved against
    # the container's WORKDIR (/app), i.e. media_dir="media" -> /app/media.
    volumes:
      - ./media:/app/media

# Note: if you ever containerize Postgres too, you'd switch back to
# bridge networking with an explicit `ports: ["8000:8000"]` mapping and
# a `depends_on: [postgres]`, and change DATABASE_URL in .env from
# `localhost` to the Postgres service's container name.